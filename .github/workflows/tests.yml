name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  cpp-tests:
    name: C++ unit tests (coco.h)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile and run C++ tests
        run: make -C src test

  perl-tests:
    name: Perl unit tests (Utils.pm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Perl tests
        run: prove -l t/
